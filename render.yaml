# Render deployment configuration
# https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: pdf-footer-scanner-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Free tier auto-sleeps after 15 min of inactivity.
    # Upgrade to 'starter' plan for always-on.
    plan: free
    region: oregon

    envVars:
      - key: NODE_ENV
        value: production

      # Set this to your Vercel frontend URL after deploying the frontend.
      # Example: https://your-app.vercel.app
      # This controls the CORS allowed origin.
      - key: FRONTEND_URL
        sync: false   # you set this manually in Render dashboard

      # Python path inside the Docker container (python3 is pre-installed)
      - key: PDF_FOOTER_SCANNER_PYTHON
        value: python3
